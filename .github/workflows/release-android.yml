name: Release Android APK

# Trigger by pushing a version tag, e.g.:  git tag v0.1.0 && git push origin v0.1.0
# Or run manually from the Actions tab (uploads the APK as a build artifact only).
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        default: 'production'
        type: choice
        options: [production, preview]

permissions:
  contents: write # needed to publish the GitHub Release

jobs:
  android:
    name: Build APK on EAS & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK on EAS (cloud, waits for completion)
        working-directory: apps/mobile
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'production' }} \
            --non-interactive --wait --json > build.json
          cat build.json

      - name: Extract APK URL
        id: apk
        working-directory: apps/mobile
        run: |
          URL=$(node -e "const b=require('./build.json'); const x=Array.isArray(b)?b[0]:b; console.log(x.artifacts.applicationArchiveUrl)")
          echo "Resolved APK: $URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Download APK
        working-directory: apps/mobile
        run: curl -fL -o "TargetGoalsTasks-${{ github.ref_name }}.apk" "${{ steps.apk.outputs.url }}"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: targetgoals-apk
          path: apps/mobile/*.apk

      - name: Publish to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/mobile/*.apk
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            TargetGoals Tasks Android APK — sideload to install (allow "install unknown apps").
            Built on EAS from this tag. See docs/ANDROID.md for setup, and docs/SELF-HOSTING.md for the server.

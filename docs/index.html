<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TargetGoals Tasks</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<meta name="theme-color" content="#1E84E3" />
<style>
  :root { color-scheme: light; }
  body {
    margin: 0; background: #f7faff; color: #1e293b; min-height: 100vh;
    display: grid; place-items: center;
    font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  .card {
    max-width: 560px; margin: 24px; padding: 40px 32px; text-align: center;
    background: #fff; border: 1px solid #e2e8f0; border-radius: 20px;
  }
  .wordmark { width: 300px; max-width: 78%; height: auto; display: block; margin: 0 auto; }
  .tag { color: #64748b; font-size: 15px; margin-top: 18px; }
  .links { margin-top: 28px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  a.btn {
    text-decoration: none; font-weight: 600; font-size: 14px; padding: 11px 18px; border-radius: 11px;
  }
  a.primary { background: #1E84E3; color: #fff; }
  a.ghost { border: 1px solid #cbd5e1; color: #1e293b; }
</style>
</head>
<body>
  <div class="card">
    <img class="wordmark" src="/wordmark.png" alt="TargetGoals" />
    <p class="tag">Tasks and daily habits with streaks — private, offline, no account needed.</p>
    <div class="links">
      <a class="btn primary" href="/privacy.html">Privacy Policy</a>
      <a class="btn ghost" href="https://github.com/investingeevee-apps/Targetgoals-tasks">Source on GitHub</a>
    </div>
  </div>
</body>
</html>
